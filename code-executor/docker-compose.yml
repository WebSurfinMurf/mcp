version: '3.8'

services:
  mcp-code-executor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-code-executor
    hostname: mcp-code-executor
    init: true
    restart: unless-stopped

    # Networks
    networks:
      - mcp-net
      - traefik-net

    # Ports
    # MCPSTANDARD §3a: no host ports published. Internal access only via
    # `docker exec` (mcp-server.ts) or container-network DNS (mcp-code-executor:3000).
    # Host port 9091 was previously published for debugging; verified 2026-04-27
    # that no live consumer relies on it.

    # Environment
    environment:
      - NODE_ENV=production
      - MCP_PROXY_URL=http://mcp-proxy:9090
      - PORT=3000
      - CODE_EXECUTOR_URL=http://localhost:3000
      - EXECUTION_TIMEOUT=300000  # 5 minutes
      - CHAT_GATEWAY_URL=http://aiagentchat-gateway:8870
      - GITLAB_API_URL=http://gitlab.ai-servicers.com/api/v4
      - GITLAB_TOKEN=${GITLAB_TOKEN_ADMIN}

    # Volumes
    volumes:
      - workspace-data:/workspace
      - /home/administrator/projects/mcp/code-executor/roles.json:/app/roles.json:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # MCPSTANDARD §3a: file-delivered keys at /run/secrets; container reads
      # MCP_KEY_FILE pointing at /run/secrets/code-executor-<role>.key.
      - /home/administrator/projects/secrets:/run/secrets:ro

    # Docker socket access (GID 127 = docker group on host)
    group_add:
      - "127"

    # Security
    security_opt:
      - no-new-privileges:true
    read_only: false  # Need write access to /tmp and /workspace
    tmpfs:
      - /tmp/executions:size=100M,noexec,nodev,nosuid,uid=1000,gid=1000

    # Resource limits
    mem_limit: 1g
    cpus: 1.0

    # User
    user: "1000:1000"

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "container_name,container_image"
        tag: "{{.Name}}"

    labels:
      - "com.docker.compose.project=mcp"
      - "description=MCP Code Executor - Sandboxed TypeScript/Python execution"

networks:
  mcp-net:
    external: true
  traefik-net:
    external: true

volumes:
  workspace-data:
    driver: local
    name: mcp-executor-workspace
